# Local Postgres for development + DB integration tests.
#   docker compose up -d
#   npm run db:migrate && npm run db:seed
services:
  db:
    image: postgres:16-alpine
    container_name: fatooralite-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fatoora
      POSTGRES_PASSWORD: fatoora
      POSTGRES_DB: fatooralite
    ports:
      - "5432:5432"
    volumes:
      - fatooralite_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatoora -d fatooralite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fatooralite_pgdata:
