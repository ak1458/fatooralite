name: Feature request
description: Suggest an idea or improvement for FatooraLite
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who is it for?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Compliance / ZATCA
        - Invoicing
        - Analytics / reporting
        - AI assistant
        - Auth / multi-entity
        - UI / UX
        - Other
